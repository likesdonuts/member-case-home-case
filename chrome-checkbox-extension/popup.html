<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkbox Clicker</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 220px;
      padding: 16px;
      margin: 0;
      background: #f9f9f9;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 15px;
      color: #333;
      text-align: center;
    }

    button {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:active {
      opacity: 0.75;
    }

    #checkAll {
      background: #4CAF50;
      color: white;
    }

    #uncheckAll {
      background: #f44336;
      color: white;
    }

    #status {
      text-align: center;
      font-size: 12px;
      color: #666;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h2>Checkbox Clicker</h2>
  <button id="checkAll">&#x2714; Check All</button>
  <button id="uncheckAll">&#x2716; Uncheck All</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
